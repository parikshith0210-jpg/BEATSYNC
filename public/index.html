<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatSync Personal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js" defer></script>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">🎵</span>
        <h1>BeatSync</h1>
        <span class="sync-badge" id="sync-badge">Syncing...</span>
        <span class="network-badge" id="network-quality">Good</span>
      </div>
      <div class="header-right">
        <span class="device-count" id="device-count">1 device</span>
      </div>
    </header>

    <!-- Now Playing -->
    <section class="now-playing-card" id="now-playing-card">
      <div class="np-art">
        <div class="np-art-inner">
          <div class="vinyl" id="vinyl">🎵</div>
        </div>
      </div>
      <div class="np-info">
        <p class="np-label">NOW PLAYING</p>
        <h2 class="np-title" id="np-title">Nothing playing yet</h2>
        <div class="np-controls">
          <button class="btn-skip" onclick="skip()">⏭ Skip</button>
          <button class="btn-voteskip" onclick="voteSkip()" title="Vote to skip"><span id="skip-votes">?/?</span></button>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </section>

    <!-- Add YouTube -->
    <section class="add-section">
      <h3>Add Music</h3>
      <div class="add-row">
        <input
          type="text"
          id="url-input"
          placeholder="Paste a YouTube video or playlist URL…"
          onkeydown="if(event.key==='Enter') add()"
        />
        <button class="btn-add" onclick="add()">＋ Add</button>
      </div>
      <div id="status-bar" class="status-bar hidden"></div>
    </section>

    <!-- Queue -->
    <section class="queue-section">
      <h3>Up Next <span class="queue-count" id="queue-count"></span></h3>
      <ol id="queue-list" class="queue-list">
        <li class="queue-empty">Queue is empty — add some songs above!</li>
      </ol>
    </section>

    <!-- History -->
    <section class="history-section">
      <h3>Recently Played</h3>
      <div id="history-list" class="history-list">
        <div class="history-empty">No history yet</div>
      </div>
    </section>

  </div>
  <script>
    // Load initial state
    window.addEventListener('load', () => {
      loadHistory();
    });
  </script>
</body>
</html>
